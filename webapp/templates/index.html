{% extends "base.html" %}
{% block body %}
  <h1>Projects</h1>
  <p class="lead">On-brand, personalized ad posters — one per project.</p>
  {% if not projects %}
    <div class="empty">
      <p>No projects yet.</p>
      <a class="btn" href="{{ url_for('new') }}">+ Add your first project</a>
    </div>
  {% endif %}
  <div class="grid">
    {% for p in projects %}
      <a class="card" href="{{ url_for('project', pid=p['id']) }}">
        <img src="{{ url_for('generated', pid=p['id']) }}" alt="{{ p['name'] }} poster">
        <div class="card-meta">
          <strong>{{ p['name'] }}</strong>
          <span class="muted">{{ p['target_interest'] or '—' }}</span>
        </div>
      </a>
    {% endfor %}
  </div>
{% endblock %}
