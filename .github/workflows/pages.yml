name: Deploy Ad Studio to GitHub Pages

# Publishes the standalone ad-studio.html to GitHub Pages. Only that single
# self-contained file is deployed — none of the Python source is exposed.
# Serving over HTTPS means the in-browser Gemini API calls work (unlike file://).

on:
  push:
    branches:
      - main
      - master
    paths:
      - ad-studio.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site (studio as both / and /ad-studio.html)
        run: |
          mkdir -p _site
          cp ad-studio.html _site/ad-studio.html
          cp ad-studio.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
