# Render blueprint for the Project AD web console (Flask + the Python pipeline).
# One-click deploy: push this repo, then in Render → New → Blueprint, point at it.
# The Gemini keys are marked sync:false — Render prompts for them in the dashboard,
# so they are NEVER stored in the repo. Set them there after the first deploy.
services:
  - type: web
    name: project-ad
    runtime: python
    plan: free
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # AI copy (free tier) + image generation. Enter these in the Render dashboard.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_API_KEY   # separate billed key for images; omit to let images fall back to the preset
        sync: false
      # Optional override: force "procedural" to skip AI image calls entirely (e.g. while image quota is 0),
      # or "gemini" to force AI images. Unset = auto (AI when a key is present, else preset).
      # - key: AD_IMAGE_PROVIDER
      #   value: procedural
